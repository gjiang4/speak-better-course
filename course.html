<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speak Better Course</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e8e8e8;
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 40px;
            text-align: center;
        }
        h2 {
            font-size: 1.4rem;
            margin-bottom: 16px;
            color: #d4a853;
        }
        .module {
            margin-bottom: 48px;
        }
        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .video-placeholder {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 60px 24px;
            text-align: center;
            color: #666;
            margin-bottom: 16px;
        }
        .coming-soon {
            color: #999;
            font-size: 0.95rem;
            font-style: italic;
            margin-bottom: 16px;
        }
        p {
            color: #999;
            line-height: 1.6;
            margin-bottom: 16px;
        }
        .download-btn {
            display: inline-block;
            background: #d4a853;
            color: #0a0a0a;
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 24px;
        }
        .download-btn:hover {
            background: #f0d080;
        }
        /* Password gate */
        #gate {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
        }
        #gate h2 {
            margin-bottom: 24px;
            color: #e8e8e8;
        }
        #gate input {
            padding: 14px 20px;
            font-size: 1.1rem;
            border: 1px solid #333;
            border-radius: 6px;
            background: #1a1a1a;
            color: #e8e8e8;
            text-align: center;
            width: 260px;
            margin-bottom: 16px;
        }
        #gate button {
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 700;
            background: #d4a853;
            color: #0a0a0a;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #gate button:hover {
            background: #f0d080;
        }
        #error {
            color: #e74c3c;
            margin-top: 12px;
            display: none;
        }
        #content {
            display: none;
        }
        footer {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            padding: 40px 0;
            border-top: 1px solid #222;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- PASSWORD GATE -->
        <div id="gate">
            <h2>課程密碼 Course Password</h2>
            <input type="password" id="password" placeholder="Enter password">
            <button onclick="checkPassword()">進入課程</button>
            <p id="error">密碼錯誤 Incorrect password</p>
        </div>

        <!-- COURSE CONTENT -->
        <div id="content">
            <h1>Speak Better Course</h1>

            <div class="module">
                <h2>Module 1</h2>
                <iframe src="https://www.youtube.com/embed/GnOHGcqy8gI" allowfullscreen></iframe>
                <iframe src="https://www.youtube.com/embed/fF6f8va8BN4" allowfullscreen></iframe>
            </div>

            <div class="module">
                <h2>Module 2</h2>
                <div class="video-placeholder">影片製作中 — Videos coming soon</div>
                <p class="coming-soon">預計上線日期：4月16日 | Expected: April 16</p>
            </div>

            <div class="module">
                <h2>Module 3</h2>
                <div class="video-placeholder">影片製作中 — Videos coming soon</div>
                <p class="coming-soon">預計上線日期：4月底 | Expected: Late April</p>
            </div>

            <a class="download-btn" href="CAR_Story_Worksheet.docx" download>下載練習工作表 Download Worksheet</a>

            <footer>
                Teacher Gary 小籠包老師
            </footer>
        </div>

    </div>

    <script>
        document.getElementById('password').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        function checkPassword() {
            if (document.getElementById('password').value === 'TGP888') {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } else {
                document.getElementById('error').style.display = 'block';
            }
        }
    </script>

</body>
</html>
